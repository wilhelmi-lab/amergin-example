name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  # Allows amergin's CI to remotely trigger this workflow after a push
  # to amergin@main, so a change there is exercised end-to-end here.
  workflow_dispatch:

jobs:
  test:
    name: "test / py${{ matrix.python }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install amergin from source
        run: pip install "amergin[benchmark,report] @ git+https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/wilhelmi-lab/amergin.git"
      - run: pip install -e ".[dev]"
      # GPU alternatives (normalize_cupy) register but fall back to original on CPU runner
      - run: pytest tests/ -v

  publish-data:
    # Append this run's benchmark output to the sibling data repo and
    # let its GitHub Pages site re-deploy automatically. The benchmark
    # itself runs against this repo's checkout; AMERGIN_STORAGE points
    # at the data-repo checkout so writes land directly inside it.
    #
    # Concurrency block serializes runs so that the push-triggered job
    # and the workflow_dispatch-triggered job (from amergin's CI) can't
    # race each other to push competing commits to the data repo.
    name: "publish benchmark data + report"
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    concurrency:
      group: publish-data-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout amergin-example
        uses: actions/checkout@v4
      - name: Checkout amergin-example-data
        uses: actions/checkout@v4
        with:
          repository: wilhelmi-lab/amergin-example-data
          path: data-repo
          token: ${{ secrets.DATA_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install amergin from source
        run: pip install "amergin[benchmark,report] @ git+https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/wilhelmi-lab/amergin.git"
      - run: pip install -e .
      - name: Run benchmark + verify + evaluate
        env:
          AMERGIN_STORAGE__BENCHMARK_DATA: ${{ github.workspace }}/data-repo
          AMERGIN_MACHINE_LABEL: github-ubuntu-cpu
        run: amergin run --steps benchmark,verify,evaluate
      - name: Commit + push to amergin-example-data
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No new data to commit."
            exit 0
          fi
          git commit -m "ci: amergin-example@${GITHUB_SHA::8} run ${GITHUB_RUN_ID}"
          # Belt-and-suspenders for a concurrent push: rebase keeping
          # OUR side on conflict (the new run's report is always the
          # correct one). NB: during rebase git's perspective is
          # inverted — `theirs` refers to commits being replayed (our
          # new data), `ours` to the branch we're rebasing onto
          # (origin/main). So `-X theirs` here means "keep our new
          # commit's files".
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $i/3); rebasing on remote main"
            git fetch origin
            git rebase -X theirs origin/main
          done
          echo "Push failed after retries"
          exit 1

  publish-data-nvidia:
    # GPU sibling of publish-data. Runs on the self-hosted devbox
    # inside an NVIDIA CUDA container; produces a separate machine
    # bucket in the data repo (devbox-nvidia).
    #
    # GUARDS:
    #   - Triggered only on push to main / workflow_dispatch (never
    #     pull_request, which would let any fork PR execute on the
    #     box).
    #   - Gated on the 'gpu-devbox' Environment. Configure required
    #     reviewers under Settings → Environments so each GPU run
    #     waits for a maintainer's Approve click.
    #   - Concurrency block prevents two simultaneous GPU pushes.
    #
    # RUNNER PREREQS (set up once on the box):
    #   - GitHub self-hosted runner registered with labels
    #     [self-hosted, devbox, nvidia]  (and amd/intel if the same
    #     box also hosts those GPUs — labels are just intent tags;
    #     a single runner can carry all three)
    #   - Docker installed
    #   - NVIDIA Container Toolkit installed and Docker configured:
    #       sudo apt-get install -y nvidia-container-toolkit
    #       sudo nvidia-ctk runtime configure --runtime=docker
    #       sudo systemctl restart docker
    #   - Network access to github.com, pypi.org, and Docker Hub
    #
    # To extend for ROCm or Intel XPU: copy this job, change the
    # container image, the --gpus / --device flags, the vendor
    # label in runs-on (nvidia → amd / intel), and the
    # AMERGIN_MACHINE_LABEL.
    name: "publish benchmark data + report (nvidia)"
    needs: test
    runs-on: [self-hosted, devbox, nvidia]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: gpu-devbox
    concurrency:
      group: publish-data-nvidia-${{ github.ref }}
      cancel-in-progress: false
    container:
      # CUDA 12.9 runtime is the latest in-band with driver 575.x. cupy-cuda12x
      # ships its own pre-built kernels, so we don't need the cudnn or devel
      # variants. The asustest04 host has driver 575.57.08 → max CUDA 12.9.
      image: nvidia/cuda:12.9.2-runtime-ubuntu22.04
      options: --gpus all
    env:
      # Belt-and-suspenders: the nvidia/cuda image is usually
      # preconfigured noninteractive, but tzdata / ca-certificates have
      # been known to prompt and hang a CI job to its 6h timeout.
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install system deps inside container
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            python3 python3-pip python3-venv git ca-certificates
          git --version
      - name: GPU passthrough smoke test
        # Fails fast with a readable error if `--gpus all` didn't actually
        # plumb the device into the container — i.e., if the NVIDIA
        # Container Toolkit isn't installed on the runner host. Without
        # this, a misconfigured runner produces a confusing failure deep
        # in cupy instead of a clear "no GPU visible" message here.
        run: |
          nvidia-smi
          python3 -c "import ctypes; ctypes.CDLL('libcuda.so.1')"
      - name: Trust git in any bind-mounted workspace
        # Container runs as root but the workspace is owned by the
        # runner's host UID — git refuses to operate on it otherwise.
        # Wildcard is safe inside an ephemeral container.
        run: git config --global --add safe.directory '*'
      - name: Checkout amergin-example
        uses: actions/checkout@v4
      - name: Checkout amergin-example-data
        uses: actions/checkout@v4
        with:
          repository: wilhelmi-lab/amergin-example-data
          path: data-repo
          token: ${{ secrets.DATA_REPO_TOKEN }}
      - name: Install amergin + numops + cupy
        run: |
          # NB: not upgrading pip — Ubuntu 22.04's pip 22.0.2 handles
          # modern wheels (including cupy-cuda12x) fine, and upgrading
          # in place leaves a half-broken pip launcher on some images.
          python3 -m pip install "amergin[benchmark,report] @ git+https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/wilhelmi-lab/amergin.git"
          python3 -m pip install -e .
          # cupy-cuda12x ships pre-built kernels for any CUDA 12.x runtime.
          python3 -m pip install cupy-cuda12x
      - name: Verify cupy sees the GPU
        # cupy lazy-loads CUDA at first device op — bare `import cupy`
        # succeeds even with no GPU. Probe the device count so we fail
        # here with a clear message instead of mid-benchmark.
        run: |
          python3 -c "import cupy; n = cupy.cuda.runtime.getDeviceCount(); assert n > 0, 'cupy reports 0 GPUs'; print(f'cupy sees {n} device(s)'); print(cupy.cuda.runtime.getDeviceProperties(0))"
      - name: Run benchmark + verify + evaluate
        env:
          AMERGIN_STORAGE__BENCHMARK_DATA: ${{ github.workspace }}/data-repo
          AMERGIN_MACHINE_LABEL: devbox-nvidia
        run: python3 -m amergin run --steps benchmark,verify,evaluate
      - name: Commit + push to amergin-example-data
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No new data to commit."
            exit 0
          fi
          git commit -m "ci(nvidia): amergin-example@${GITHUB_SHA::8} run ${GITHUB_RUN_ID}"
          # Rebase note: during a rebase `theirs` refers to commits
          # being replayed (our new data), `ours` to the branch we're
          # rebasing onto (origin/main). So `-X theirs` here means
          # "keep our new commit's files on conflict" — which is what
          # we want since report/* is the only thing that can clash
          # and our latest report is the correct one.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $i/3); rebasing on remote main"
            git fetch origin
            git rebase -X theirs origin/main
          done
          echo "Push failed after retries"
          exit 1
